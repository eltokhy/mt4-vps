[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 1600x900x24 -ac +extension RANDR
autorestart=true
priority=10
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.err

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":0"
autorestart=true
priority=20
stdout_logfile=/var/log/fluxbox.log
stderr_logfile=/var/log/fluxbox.err

[program:x11vnc]
command=/usr/bin/x11vnc -display :0 -forever -shared -rfbport 5900 -rfbauth /wine/.vncpass -nopw -o /var/log/x11vnc.log
autorestart=true
priority=30
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc.err

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc/ 6080 localhost:5900
autorestart=true
priority=40
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.err

[program:mt4]
command=/entrypoint.sh run-mt4
environment=DISPLAY=":0",WINEPREFIX="/wine",WINEARCH="win64"
autorestart=true
startsecs=60
startretries=100
priority=50
stdout_logfile=/var/log/mt4.log
stderr_logfile=/var/log/mt4.err
