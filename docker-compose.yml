# MT4 VPS stack for Dokploy.
# Build sources live in ./mt4, ./news-fetcher, ./watchdog.
# Traefik labels below wire mt4.enginecy.cloud -> noVNC on port 6080.

services:
  mt4:
    build:
      context: ./mt4
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: mt4
    restart: unless-stopped
    volumes:
      - mt4_prefix:/wine
      - news_shared:/news
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme}
      - MT4_INSTALLER_URL=${MT4_INSTALLER_URL:-https://download.mql5.com/cdn/web/8472/mt4/icmarkets4setup.exe}
      - WINEDEBUG=fixme-all,err-ole
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.mt4.rule=Host(`mt4.enginecy.cloud`)
      - traefik.http.routers.mt4.entrypoints=websecure
      - traefik.http.routers.mt4.tls.certresolver=letsencrypt
      - traefik.http.services.mt4.loadbalancer.server.port=6080

  news-fetcher:
    build:
      context: ./news-fetcher
      dockerfile: Dockerfile
    container_name: mt4-news-fetcher
    restart: unless-stopped
    volumes:
      - news_shared:/news
    environment:
      - BROKER_TZ=Europe/Athens
      - IMPACT_FILTER=High
      - CURRENCY_FILTER=USD|XAU
    networks:
      - dokploy-network

  watchdog:
    build:
      context: ./watchdog
      dockerfile: Dockerfile
    container_name: mt4-watchdog
    restart: unless-stopped
    volumes:
      - mt4_prefix:/wine:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - STALE_SECS=60
      - POLL_SECS=15
    depends_on:
      - mt4
    networks:
      - dokploy-network

volumes:
  mt4_prefix:
  news_shared:

networks:
  dokploy-network:
    external: true
